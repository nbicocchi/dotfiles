# ==============================
# Alacritty Configuration (Noto)
# ==============================

# Window
[window]
padding = { x = 10, y = 10 }
dynamic_padding = true
decorations = "full"
opacity = 0.95
startup_mode = "Windowed"
title = "Alacritty"
dimensions = { columns = 160, lines = 40 }

[general]
import = [
    "~/.config/alacritty/themes/gruvbox_dark.toml"
]

# Font configuration
[font]
size = 12.0

[font.normal]
family = "Noto Sans Mono"
style = "Regular"

[font.bold]
family = "Noto Sans Mono"
style = "Bold"

[font.italic]
family = "Noto Sans Mono"
style = "Italic"

[font.bold_italic]
family = "Noto Sans Mono"
style = "Bold Italic"

# Optional emoji fallback (important for emoji support)
[font.offset]
x = 0
y = 0

# Cursor
[cursor]
style = { shape = "Block", blinking = "On" }
unfocused_hollow = true

# Scrolling
[scrolling]
history = 10000
multiplier = 3

# Selection
[selection]
save_to_clipboard = true

# Keybindings
[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "Return"
mods = "Alt"
action = "ToggleFullscreen"
